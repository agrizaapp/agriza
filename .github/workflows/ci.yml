name: CI

# Roda em PR para a main e em push direto na main. O objetivo é simples:
# nenhuma mudança chega ao deploy do Render sem compilar e passar nos testes.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Um push novo no mesmo branch cancela a execução anterior, que já ficou velha.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testes:
    name: Compilação e testes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar Python 3.12
        uses: actions/setup-python@v5
        with:
          # Mesma linha do PYTHON_VERSION do render.yaml, para o CI validar
          # o mesmo ambiente que roda em produção.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compilar tudo
        run: python -m compileall -q app.py core services modules market_prices.py

      - name: Rodar os testes
        # Sem DATABASE_URL: o conftest cria um SQLite temporário próprio e
        # nenhum banco real é tocado.
        run: pytest tests -q --junitxml=resultado-testes.xml

      - name: Publicar resultado dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-testes
          path: resultado-testes.xml
          if-no-files-found: ignore
